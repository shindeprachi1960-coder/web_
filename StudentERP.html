<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduPortal – Student ERP</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050811;--bg2:#0c1120;--bg3:#101828;--bg4:#141e2e;
  --acc:#6366f1;--acc2:#818cf8;--acc3:#4f46e5;
  --teal:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;
  --t1:#f8fafc;--t2:#94a3b8;--t3:#475569;--t4:#1e293b;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.12);
  --font:'Plus Jakarta Sans',sans-serif;--font2:'Syne',sans-serif;
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.35);border-radius:2px;}
input,select,textarea,button{font-family:var(--font);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.02)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes modalPop{from{opacity:0;transform:scale(0.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

const BRANCHES=["Computer Science","Information Technology","Electronics & Communication","Mechanical Engineering","Civil Engineering","Electrical Engineering","Biotechnology","Chemical Engineering"];
const COURSES={"Computer Science":["Data Structures","Algorithms","DBMS","Operating Systems","Web Development","AI & ML","Computer Networks","Compiler Design"],"Information Technology":["Web Technologies","Cyber Security","Cloud Computing","IoT","Data Mining","Software Engineering","Mobile App Dev"],"Electronics & Communication":["Digital Electronics","Signal Processing","VLSI Design","Microprocessors","Embedded Systems","Communication Systems"],"Mechanical Engineering":["Thermodynamics","Fluid Mechanics","Machine Design","CAD/CAM","Manufacturing Processes","Heat Transfer"],"Civil Engineering":["Structural Analysis","Soil Mechanics","Fluid Mechanics","Surveying","Construction Management","Environmental Engg"],"Electrical Engineering":["Circuit Theory","Power Systems","Control Systems","Electrical Machines","Power Electronics","Instrumentation"],"Biotechnology":["Molecular Biology","Genetic Engineering","Biochemistry","Microbiology","Bioprocess Engineering","Bioinformatics"],"Chemical Engineering":["Chemical Reaction Engineering","Transport Phenomena","Process Control","Thermodynamics","Mass Transfer"]};
const SEMESTERS=["1st","2nd","3rd","4th","5th","6th","7th","8th"];
const BCOLORS=["#6366f1","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ef4444","#ec4899","#14b8a6"];
const SEED=[
  {id:"STU001",name:"Ananya Sharma",gender:"Female",dob:"2003-04-12",phone:"9876543210",email:"ananya@edu.in",address:"123 MG Road, Pune",branch:"Computer Science",semester:"5th",attendance:88,cgpa:8.6,fees:75000,feesPaid:75000,feesStatus:"Paid",courses:["Data Structures","Algorithms","DBMS","Operating Systems"],exams:[{sub:"Data Structures",marks:85,max:100},{sub:"Algorithms",marks:78,max:100},{sub:"DBMS",marks:91,max:100}],joinDate:"2021-07-15"},
  {id:"STU002",name:"Rahul Patil",gender:"Male",dob:"2003-09-20",phone:"9812345678",email:"rahul@edu.in",address:"45 Shivaji Nagar, Nashik",branch:"Mechanical Engineering",semester:"3rd",attendance:72,cgpa:7.1,fees:65000,feesPaid:30000,feesStatus:"Partial",courses:["Thermodynamics","Fluid Mechanics","Machine Design"],exams:[{sub:"Thermodynamics",marks:60,max:100},{sub:"Fluid Mechanics",marks:71,max:100}],joinDate:"2022-07-20"},
  {id:"STU003",name:"Priya Mehta",gender:"Female",dob:"2001-12-05",phone:"9911223344",email:"priya@edu.in",address:"78 Link Road, Mumbai",branch:"Information Technology",semester:"7th",attendance:94,cgpa:9.1,fees:80000,feesPaid:0,feesStatus:"Unpaid",courses:["Cyber Security","Cloud Computing","IoT","Data Mining"],exams:[{sub:"Cyber Security",marks:92,max:100},{sub:"Cloud Computing",marks:87,max:100}],joinDate:"2020-07-18"},
  {id:"STU004",name:"Arjun Desai",gender:"Male",dob:"2002-06-30",phone:"9977665544",email:"arjun@edu.in",address:"22 Deccan, Pune",branch:"Electronics & Communication",semester:"4th",attendance:65,cgpa:6.8,fees:70000,feesPaid:70000,feesStatus:"Paid",courses:["Digital Electronics","Signal Processing","VLSI Design"],exams:[{sub:"Digital Electronics",marks:55,max:100},{sub:"Signal Processing",marks:63,max:100}],joinDate:"2021-07-10"},
  {id:"STU005",name:"Sneha Kulkarni",gender:"Female",dob:"2002-03-17",phone:"9823456789",email:"sneha@edu.in",address:"9 Baner Road, Pune",branch:"Civil Engineering",semester:"6th",attendance:91,cgpa:8.3,fees:68000,feesPaid:68000,feesStatus:"Paid",courses:["Structural Analysis","Soil Mechanics","Fluid Mechanics"],exams:[{sub:"Structural Analysis",marks:82,max:100},{sub:"Soil Mechanics",marks:79,max:100}],joinDate:"2021-07-22"},
  {id:"STU006",name:"Vikram Singh",gender:"Male",dob:"2004-01-08",phone:"9001234567",email:"vikram@edu.in",address:"56 Koregaon Park, Pune",branch:"Biotechnology",semester:"2nd",attendance:80,cgpa:7.5,fees:72000,feesPaid:36000,feesStatus:"Partial",courses:["Molecular Biology","Biochemistry"],exams:[{sub:"Molecular Biology",marks:74,max:100}],joinDate:"2023-07-15"},
  {id:"STU007",name:"Kavya Nair",gender:"Female",dob:"2003-07-22",phone:"9988776655",email:"kavya@edu.in",address:"34 MG Road, Kochi",branch:"Electrical Engineering",semester:"5th",attendance:85,cgpa:8.0,fees:69000,feesPaid:69000,feesStatus:"Paid",courses:["Circuit Theory","Power Systems","Control Systems"],exams:[{sub:"Circuit Theory",marks:80,max:100},{sub:"Power Systems",marks:76,max:100}],joinDate:"2021-07-14"},
  {id:"STU008",name:"Rohan Sharma",gender:"Male",dob:"2004-03-15",phone:"9112233445",email:"rohan@edu.in",address:"12 Sector 5, Noida",branch:"Chemical Engineering",semester:"1st",attendance:78,cgpa:7.2,fees:71000,feesPaid:0,feesStatus:"Unpaid",courses:["Thermodynamics","Mass Transfer"],exams:[{sub:"Thermodynamics",marks:68,max:100}],joinDate:"2024-07-10"},
];

const ini=n=>n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const avc=n=>{const c=["#6366f1","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ef4444","#ec4899","#14b8a6"];let h=0;for(const x of n)h=(h*31+x.charCodeAt(0))%c.length;return c[h];};
const nid=arr=>{const n=arr.map(s=>parseInt(s.id.replace("STU",""))||0);return "STU"+String(Math.max(0,...n)+1).padStart(3,"0");};
const grd=m=>m>=90?"O":m>=80?"A+":m>=70?"A":m>=60?"B+":m>=50?"B":"F";
const gcol=m=>m>=75?"#10b981":m>=60?"#f59e0b":"#ef4444";
const autoSt=(p,t)=>p<=0?"Unpaid":p>=t?"Paid":"Partial";

/* ── ATOMS ── */
const Avatar=({name,size=36})=>(
  <div style={{width:size,height:size,borderRadius:size*0.28,flexShrink:0,background:`linear-gradient(135deg,${avc(name)},${avc(name)}bb)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.33,fontWeight:700,color:"#fff",fontFamily:"var(--font2)",boxShadow:`0 0 0 2px ${avc(name)}33`}}>
    {ini(name)}
  </div>
);

const Badge=({children,color="indigo",size="sm"})=>{
  const m={indigo:["rgba(99,102,241,.15)","#818cf8","rgba(99,102,241,.25)"],green:["rgba(16,185,129,.15)","#34d399","rgba(16,185,129,.25)"],red:["rgba(239,68,68,.15)","#f87171","rgba(239,68,68,.25)"],amber:["rgba(245,158,11,.15)","#fbbf24","rgba(245,158,11,.25)"],cyan:["rgba(6,182,212,.15)","#22d3ee","rgba(6,182,212,.25)"],pink:["rgba(236,72,153,.15)","#f472b6","rgba(236,72,153,.25)"],gray:["rgba(148,163,184,.1)","#94a3b8","rgba(148,163,184,.2)"]};
  const[bg,col,bdr]=m[color]||m.indigo;
  return <span style={{display:"inline-flex",alignItems:"center",padding:size==="xs"?"2px 7px":"3px 10px",borderRadius:20,fontSize:size==="xs"?10:11,fontWeight:700,background:bg,color:col,border:`1px solid ${bdr}`,whiteSpace:"nowrap"}}>{children}</span>;
};

const FeesBadge=({s})=>s==="Paid"?<Badge color="green">✓ Paid</Badge>:s==="Unpaid"?<Badge color="red">✗ Unpaid</Badge>:<Badge color="amber">≈ Partial</Badge>;
const AttBadge=({v})=>v>=85?<Badge color="green">{v}%</Badge>:v>=75?<Badge color="amber">{v}%</Badge>:<Badge color="red">{v}%</Badge>;

const ProgressBar=({value,max=100,color="#6366f1",height=6})=>(
  <div style={{background:"rgba(255,255,255,0.05)",borderRadius:999,height,overflow:"hidden",flex:1,minWidth:60}}>
    <div style={{height:"100%",width:`${Math.min((value/max)*100,100)}%`,background:color,borderRadius:999,transition:"width 0.6s cubic-bezier(0.4,0,0.2,1)",boxShadow:`0 0 8px ${color}66`}}/>
  </div>
);

const StatCard=({label,value,color,icon,sub})=>{
  const g={indigo:"linear-gradient(135deg,#6366f1,#8b5cf6)",cyan:"linear-gradient(135deg,#06b6d4,#3b82f6)",green:"linear-gradient(135deg,#10b981,#059669)",amber:"linear-gradient(135deg,#f59e0b,#d97706)",pink:"linear-gradient(135deg,#ec4899,#db2777)"};
  const bg=g[color]||g.indigo;
  return(
    <div style={{background:"var(--bg3)",border:"1px solid var(--bdr)",borderRadius:16,padding:"18px 20px",position:"relative",overflow:"hidden",animation:"fadeUp 0.4s ease both",transition:"border-color 0.2s,transform 0.2s"}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--bdr2)";e.currentTarget.style.transform="translateY(-2px)";}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.transform="translateY(0)";}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:bg}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>{label}</div>
          <div style={{fontFamily:"var(--font2)",fontSize:28,fontWeight:800,color:"var(--t1)",lineHeight:1}}>{value}</div>
          {sub&&<div style={{fontSize:11,color:"var(--t3)",marginTop:6}}>{sub}</div>}
        </div>
        <div style={{width:42,height:42,borderRadius:12,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:`0 4px 16px ${color==="indigo"?"#6366f133":color==="cyan"?"#06b6d433":"#10b98133"}`}}>{icon}</div>
      </div>
    </div>
  );
};

const Btn=({children,onClick,variant="primary",size="md",disabled=false})=>{
  const s={primary:{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",boxShadow:"0 4px 15px rgba(99,102,241,0.35)"},secondary:{background:"var(--bg4)",color:"var(--t2)",border:"1px solid var(--bdr2)"},danger:{background:"rgba(239,68,68,.12)",color:"#f87171",border:"1px solid rgba(239,68,68,.25)"},success:{background:"rgba(16,185,129,.12)",color:"#34d399",border:"1px solid rgba(16,185,129,.25)"},ghost:{background:"transparent",color:"var(--t2)",border:"1px solid var(--bdr)"}};
  const sz={sm:{padding:"5px 12px",fontSize:12},md:{padding:"8px 16px",fontSize:13},lg:{padding:"12px 24px",fontSize:14}};
  return(
    <button onClick={onClick} disabled={disabled} style={{display:"inline-flex",alignItems:"center",gap:6,borderRadius:10,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.15s",fontFamily:"var(--font)",...s[variant],...sz[size]}}
      onMouseEnter={e=>{if(!disabled&&variant==="primary"){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(99,102,241,0.45)";}}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=s[variant].boxShadow||"";}}>
      {children}
    </button>
  );
};

const Input=({value,onChange,placeholder,type="text",min,max,step})=>(
  <input type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} max={max} step={step}
    style={{padding:"9px 12px",background:"var(--bg2)",border:"1px solid var(--bdr2)",borderRadius:9,color:"var(--t1)",fontSize:13,outline:"none",width:"100%",transition:"border-color 0.2s,box-shadow 0.2s",fontFamily:"var(--font)"}}
    onFocus={e=>{e.target.style.borderColor="#6366f1";e.target.style.boxShadow="0 0 0 3px rgba(99,102,241,0.12)";}}
    onBlur={e=>{e.target.style.borderColor="var(--bdr2)";e.target.style.boxShadow="none";}}/>
);

const Sel=({value,onChange,children})=>(
  <select value={value} onChange={onChange} style={{padding:"9px 12px",background:"var(--bg2)",border:"1px solid var(--bdr2)",borderRadius:9,color:"var(--t1)",fontSize:13,outline:"none",width:"100%",cursor:"pointer",fontFamily:"var(--font)"}}>
    {children}
  </select>
);

const Fld=({label,children,full})=>(
  <div style={{gridColumn:full?"1/-1":undefined,display:"flex",flexDirection:"column",gap:6}}>
    <label style={{fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".06em"}}>{label}</label>
    {children}
  </div>
);

const Th=({children})=>(
  <th style={{padding:"10px 16px",fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".06em",background:"rgba(255,255,255,0.02)",textAlign:"left",borderBottom:"1px solid var(--bdr)",whiteSpace:"nowrap"}}>{children}</th>
);
const Td=({children,style:sx={}})=>(
  <td style={{padding:"12px 16px",color:"var(--t2)",borderBottom:"1px solid rgba(255,255,255,0.04)",verticalAlign:"middle",...sx}}>{children}</td>
);

const Card=({children,style:sx={}})=>(
  <div style={{background:"var(--bg3)",border:"1px solid var(--bdr)",borderRadius:16,overflow:"hidden",...sx}}>{children}</div>
);

const CardHd=({title,right})=>(
  <div style={{padding:"16px 20px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
    <span style={{fontFamily:"var(--font2)",fontWeight:700,fontSize:15,color:"var(--t1)"}}>{title}</span>
    {right}
  </div>
);

const Toast=({msg,type})=>(
  <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,background:"var(--bg3)",border:`1px solid var(--bdr2)`,borderLeft:`4px solid ${type==="success"?"#10b981":type==="error"?"#ef4444":"#6366f1"}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 20px 50px rgba(0,0,0,0.5)",animation:"toastSlide 0.35s cubic-bezier(0.16,1,0.3,1)",minWidth:260,maxWidth:340}}>
    <span style={{fontSize:18}}>{type==="success"?"✅":type==="error"?"❌":"ℹ️"}</span>
    <span style={{fontSize:13,color:"var(--t1)",fontWeight:500}}>{msg}</span>
  </div>
);

const Modal=({open,onClose,title,children,width=580})=>{
  if(!open)return null;
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn 0.2s ease"}}>
      <div style={{background:"var(--bg3)",border:"1px solid var(--bdr2)",borderRadius:20,width:"100%",maxWidth:width,maxHeight:"90vh",overflowY:"auto",animation:"modalPop 0.3s cubic-bezier(0.16,1,0.3,1)",boxShadow:"0 30px 80px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"22px 26px 18px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontFamily:"var(--font2)",fontWeight:700,fontSize:17,color:"var(--t1)"}}>{title}</span>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:8,background:"var(--bg4)",border:"1px solid var(--bdr)",cursor:"pointer",color:"var(--t2)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
};

/* ── STUDENT FORM ── */
const StudentForm=({open,onClose,onSave,editing})=>{
  const blank={name:"",gender:"Male",dob:"",phone:"",email:"",address:"",branch:BRANCHES[0],semester:"1st",attendance:0,cgpa:0,fees:0,feesPaid:0,feesStatus:"Unpaid",courses:[]};
  const[f,setF]=useState(blank);
  useEffect(()=>{setF(editing?{...blank,...editing}:blank);},[editing,open]);
  if(!open)return null;
  const ch=(k,v)=>setF(p=>({...p,[k]:v}));
  const tog=c=>setF(p=>({...p,courses:p.courses.includes(c)?p.courses.filter(x=>x!==c):[...p.courses,c]}));
  const crs=COURSES[f.branch]||[];
  const save=()=>{
    if(!f.name.trim()||!f.email.trim())return alert("Name and Email required.");
    onSave({...f,attendance:+f.attendance,cgpa:+f.cgpa,fees:+f.fees,feesPaid:+f.feesPaid});
    onClose();
  };
  return(
    <Modal open={open} onClose={onClose} title={editing?`Edit — ${editing.name}`:"Add New Student"}>
      <div style={{padding:"20px 26px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Fld label="Full Name *"><Input value={f.name} onChange={e=>ch("name",e.target.value)} placeholder="e.g. Rohan Sharma"/></Fld>
        <Fld label="Gender"><Sel value={f.gender} onChange={e=>ch("gender",e.target.value)}>{["Male","Female","Other"].map(g=><option key={g}>{g}</option>)}</Sel></Fld>
        <Fld label="Date of Birth"><Input type="date" value={f.dob} onChange={e=>ch("dob",e.target.value)}/></Fld>
        <Fld label="Phone"><Input value={f.phone} onChange={e=>ch("phone",e.target.value)} placeholder="10-digit mobile"/></Fld>
        <Fld label="Email *" full><Input type="email" value={f.email} onChange={e=>ch("email",e.target.value)} placeholder="student@edu.in"/></Fld>
        <Fld label="Address" full><Input value={f.address} onChange={e=>ch("address",e.target.value)} placeholder="Full address"/></Fld>
        <Fld label="Branch"><Sel value={f.branch} onChange={e=>{ch("branch",e.target.value);ch("courses",[]);}}>{BRANCHES.map(b=><option key={b}>{b}</option>)}</Sel></Fld>
        <Fld label="Semester"><Sel value={f.semester} onChange={e=>ch("semester",e.target.value)}>{SEMESTERS.map(s=><option key={s}>{s}</option>)}</Sel></Fld>
        <Fld label="Attendance (%)"><Input type="number" min="0" max="100" value={f.attendance} onChange={e=>ch("attendance",e.target.value)}/></Fld>
        <Fld label="CGPA (0–10)"><Input type="number" min="0" max="10" step="0.1" value={f.cgpa} onChange={e=>ch("cgpa",e.target.value)}/></Fld>
        <Fld label="Total Fees (₹)"><Input type="number" min="0" value={f.fees} onChange={e=>{ch("fees",e.target.value);ch("feesStatus",autoSt(+f.feesPaid,+e.target.value));}}/></Fld>
        <Fld label="Fees Paid (₹)"><Input type="number" min="0" value={f.feesPaid} onChange={e=>{ch("feesPaid",e.target.value);ch("feesStatus",autoSt(+e.target.value,+f.fees));}}/></Fld>
        <Fld label="Fee Status" full><Sel value={f.feesStatus} onChange={e=>ch("feesStatus",e.target.value)}>{["Paid","Unpaid","Partial"].map(s=><option key={s}>{s}</option>)}</Sel></Fld>
        <Fld label="Enrolled Courses" full>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:4}}>
            {crs.map(c=>(
              <label key={c} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:f.courses.includes(c)?"#818cf8":"var(--t2)",cursor:"pointer",padding:"6px 10px",borderRadius:8,background:f.courses.includes(c)?"rgba(99,102,241,.12)":"transparent",border:`1px solid ${f.courses.includes(c)?"rgba(99,102,241,.3)":"var(--bdr)"}`,transition:"all 0.15s"}}>
                <input type="checkbox" checked={f.courses.includes(c)} onChange={()=>tog(c)} style={{accentColor:"#6366f1",width:13,height:13}}/>
                {c}
              </label>
            ))}
          </div>
        </Fld>
      </div>
      <div style={{padding:"14px 26px 22px",display:"flex",gap:10,justifyContent:"flex-end",borderTop:"1px solid var(--bdr)"}}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={save}>✓ Save Student</Btn>
      </div>
    </Modal>
  );
};

const SBox=({value,onChange,placeholder="Search..."})=>(
  <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--bg2)",border:"1px solid var(--bdr2)",borderRadius:10,padding:"7px 12px",minWidth:200}}>
    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" style={{color:"var(--t3)",flexShrink:0}}><circle cx="11" cy="11" r="8" stroke="currentColor" strokeWidth="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" strokeWidth="2"/></svg>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:"none",border:"none",outline:"none",color:"var(--t1)",fontSize:13,fontFamily:"var(--font)",width:"100%"}}/>
    {value&&<button onClick={()=>onChange("")} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:16,lineHeight:1,padding:0}}>×</button>}
  </div>
);

const FSel=({value,onChange,children})=>(

        <StatCard label="Pending Dues" value={`₹${((tp-tc)/1000).toFixed(0)}K`} color="amber" icon="⏳" sub="Outstanding amount"/>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16,animation:"fadeUp 0.4s ease"}}>
      {BRANCHES.map((b,i)=>{
        const c=BCOLORS[i%BCOLORS.length],cnt=bd[b]||0,crs=COURSES[b]||[];
        return(
          <div key={b} style={{background:"var(--bg3)",border:"1px solid var(--bdr)",borderTop:`3px solid ${c}`,borderRadius:16,padding:"18px",transition:"border-color 0.2s,transform 0.2s",animation:`fadeUp ${0.2+i*0.06}s ease both`}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow=`0 8px 30px ${c}22`;}}
            onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontFamily:"var(--font2)",fontWeight:700,fontSize:14,color:"var(--t1)",marginBottom:3}}>{b}</div>
                <div style={{fontSize:11,color:"var(--t3)"}}>{crs.length} courses offered</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"var(--font2)",fontSize:28,fontWeight:800,color:c}}>{cnt}</div>
                <div style={{fontSize:10,color:"var(--t3)"}}>students</div>
              </div>
            </div>
            <div style={{marginBottom:12}}><ProgressBar value={cnt} max={Math.max(...Object.values(bd),1)} color={c} height={5}/></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {crs.slice(0,4).map(c2=><span key={c2} style={{background:`${c}15`,color:c,border:`1px solid ${c}30`,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600}}>{c2}</span>)}
              {crs.length>4&&<span style={{background:"rgba(255,255,255,0.05)",color:"var(--t3)",border:"1px solid var(--bdr)",padding:"2px 8px",borderRadius:20,fontSize:10}}>+{crs.length-4} more</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* ══ SIDEBAR ══ */
const NAV=[{id:"dashboard",label:"Dashboard",icon:"⊞",s:"main"},{id:"students",label:"Students",icon:"👥",s:"main"},{id:"fees",label:"Fees",icon:"💳",s:"main"},{id:"attendance",label:"Attendance",icon:"📋",s:"academic"},{id:"exams",label:"Exams",icon:"📝",s:"academic"},{id:"reports",label:"Reports",icon:"📊",s:"academic"},{id:"branches",label:"Branches",icon:"🏛",s:"settings"}];

const Sidebar=({page,setPage,students,onLogout})=>{
  const unpaid=students.filter(s=>s.feesStatus==="Unpaid").length;
  return(
    <aside style={{width:220,minWidth:220,background:"var(--bg2)",borderRight:"1px solid var(--bdr)",display:"flex",flexDirection:"column",height:"100vh"}}>
      <div style={{padding:"22px 18px 18px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(99,102,241,0.4)",flexShrink:0}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="white" strokeWidth="2" strokeLinecap="round"/><polyline points="9,22 9,12 15,12 15,22" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
        </div>
        <div>
          <div style={{fontFamily:"var(--font2)",fontWeight:800,fontSize:16,color:"var(--t1)"}}>EduPortal</div>
          <div style={{fontSize:10,color:"#6366f1",fontWeight:600}}>Student ERP</div>
        </div>
      </div>
      <nav style={{flex:1,overflowY:"auto",padding:"12px 10px"}}>
        {[{k:"main",l:"Main"},{k:"academic",l:"Academic"},{k:"settings",l:"Settings"}].map(sec=>(
          <div key={sec.k}>
            <div style={{fontSize:9,fontWeight:700,color:"var(--t4)",textTransform:"uppercase",letterSpacing:".1em",padding:"10px 10px 4px",marginTop:sec.k!=="main"?8:0}}>{sec.l}</div>
            {NAV.filter(n=>n.s===sec.k).map(n=>{
              const act=page===n.id;
              const badge=n.id==="students"?students.length:n.id==="fees"&&unpaid?unpaid:0;
              return(
                <div key={n.id} onClick={()=>setPage(n.id)}
                  style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderRadius:10,marginBottom:2,cursor:"pointer",fontSize:13,fontWeight:500,color:act?"#818cf8":"var(--t2)",background:act?"rgba(99,102,241,.15)":"transparent",border:`1px solid ${act?"rgba(99,102,241,.25)":"transparent"}`,transition:"all 0.15s"}}
                  onMouseEnter={e=>{if(!act){e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.color="var(--t1)";}}}
                  onMouseLeave={e=>{if(!act){e.currentTarget.style.background="transparent";e.currentTarget.style.color="var(--t2)";}}}
                >
                  <span style={{fontSize:15}}>{n.icon}</span>
                  <span>{n.label}</span>
                  {badge>0&&<span style={{marginLeft:"auto",background:"#6366f1",color:"#fff",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:10,minWidth:18,textAlign:"center"}}>{badge}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </nav>
      <div style={{padding:"14px 12px",borderTop:"1px solid var(--bdr)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff",fontFamily:"var(--font2)"}}>AD</div>
          <div><div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>Admin</div><div style={{fontSize:10,color:"var(--t3)"}}>admin@edu.in</div></div>
        </div>
        <button onClick={onLogout} style={{width:"100%",padding:"8px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:9,color:"#f87171",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",transition:"background 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(239,68,68,.15)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(239,68,68,.08)"}>
          ← Logout
        </button>
      </div>
    </aside>
  );
};

/* ══ LOGIN ══ */
const Login=({onLogin})=>{
  const[u,setU]=useState("");const[p,setP]=useState("");const[sp,setSp]=useState(false);const[err,setErr]=useState("");const[ld,setLd]=useState(false);
  const go=useCallback(()=>{
    if(u==="admin"&&p==="admin123"){setLd(true);setTimeout(()=>onLogin(),800);}
    else{setErr("Invalid credentials. Use admin / admin123");setTimeout(()=>setErr(""),3000);}
  },[u,p,onLogin]);
  return(
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",position:"relative",overflow:"hidden"}}>
      {[[500,500,"#6366f1",-150,-150],[400,400,"#8b5cf6",undefined,undefined,undefined,-100,undefined,-100],[300,300,"#06b6d4"]].map(([w,h,bg],i)=>(
        <div key={i} style={{position:"absolute",width:w,height:h,borderRadius:"50%",background:bg,opacity:.12,filter:"blur(90px)",top:i===0?-150:i===2?"40%":undefined,bottom:i===1?-100:undefined,left:i===0?-150:i===2?"55%":undefined,right:i===1?-100:undefined,animation:`float ${12+i*4}s ease-in-out infinite alternate`,animationDelay:`${i*2}s`}}/>
      ))}
      <div style={{position:"absolute",inset:0,opacity:.04,backgroundImage:"linear-gradient(rgba(99,102,241,1) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,1) 1px,transparent 1px)",backgroundSize:"50px 50px"}}/>
      <div style={{background:"rgba(12,17,32,0.88)",backdropFilter:"blur(24px)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:24,padding:"44px 40px",width:"100%",maxWidth:420,position:"relative",zIndex:2,boxShadow:"0 0 80px rgba(99,102,241,0.12),0 30px 60px rgba(0,0,0,0.6)",animation:"fadeUp 0.6s cubic-bezier(0.16,1,0.3,1)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
          <div style={{width:46,height:46,borderRadius:13,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="white" strokeWidth="2" strokeLinecap="round"/><polyline points="9,22 9,12 15,12 15,22" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
          </div>
          <div>
            <div style={{fontFamily:"var(--font2)",fontWeight:800,fontSize:22,color:"var(--t1)"}}>EduPortal</div>
            <div style={{fontSize:12,color:"#6366f1",fontWeight:600,letterSpacing:".04em"}}>Student ERP System</div>
          </div>
        </div>
        <div style={{fontFamily:"var(--font2)",fontSize:26,fontWeight:800,color:"var(--t1)",marginBottom:6}}>Welcome Back</div>
        <div style={{fontSize:14,color:"var(--t3)",marginBottom:26}}>Sign in to access your portal</div>
        {err&&<div style={{marginBottom:16,padding:"12px 14px",background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,color:"#f87171",fontSize:13,animation:"fadeIn 0.2s ease"}}>{err}</div>}
        {["Username","Password"].map((lbl,i)=>(
          <div key={lbl} style={{marginBottom:i===0?14:20}}>
            <label style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:7}}>{lbl}</label>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:16}}>{i===0?"👤":"🔒"}</span>
              <input value={i===0?u:p} onChange={e=>i===0?setU(e.target.value):setP(e.target.value)} type={i===0?"text":sp?"text":"password"} placeholder={i===0?"Enter username":"Enter password"}
                onKeyDown={e=>e.key==="Enter"&&go()}
                style={{width:"100%",padding:`12px ${i===1?"44px":14}px 12px 40px`,background:"rgba(15,23,42,0.8)",border:"1px solid var(--bdr2)",borderRadius:12,color:"var(--t1)",fontSize:14,outline:"none",fontFamily:"var(--font)",transition:"all 0.2s"}}
                onFocus={e=>{e.target.style.borderColor="#6366f1";e.target.style.boxShadow="0 0 0 3px rgba(99,102,241,0.15)";}}
                onBlur={e=>{e.target.style.borderColor="var(--bdr2)";e.target.style.boxShadow="none";}}/>
              {i===1&&<button onClick={()=>setSp(!sp)} style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16}}>{sp?"🙈":"👁"}</button>}
            </div>
          </div>
        ))}
        <button onClick={go} disabled={ld} style={{width:"100%",padding:14,borderRadius:12,border:"none",cursor:ld?"wait":"pointer",background:ld?"rgba(99,102,241,0.5)":"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontFamily:"var(--font2)",fontWeight:700,fontSize:15,letterSpacing:".04em",boxShadow:"0 4px 20px rgba(99,102,241,0.35)",transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
          onMouseEnter={e=>{if(!ld){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 6px 28px rgba(99,102,241,0.5)";}}}
          onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 4px 20px rgba(99,102,241,0.35)";}}>
          {ld&&<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>}
          {ld?"Signing In...":"Sign In →"}
        </button>
        <div style={{marginTop:20,paddingTop:18,borderTop:"1px solid var(--bdr)",textAlign:"center",fontSize:12,color:"var(--t4)"}}>
          Demo: <span style={{color:"#6366f1",fontWeight:700}}>admin</span> / <span style={{color:"#6366f1",fontWeight:700}}>admin123</span>
        </div>
      </div>
    </div>
  );
};

/* ══ ROOT APP ══ */
function App(){
  const[loggedIn,setLoggedIn]=useState(false);
  const[page,setPage]=useState("dashboard");
  const[students,setStudents]=useState(()=>{try{return JSON.parse(localStorage.getItem("erp_v4")||"null")||[...SEED];}catch{return[...SEED];}});
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[toast,setToast]=useState(null);

  useEffect(()=>{try{localStorage.setItem("erp_v4",JSON.stringify(students));}catch{}},[students]);

  const showToast=useCallback((msg,type)=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);},[]);

  const handleSave=useCallback(data=>{
    if(editing){setStudents(p=>p.map(s=>s.id===editing.id?{...s,...data}:s));showToast("Student updated!","success");}
    else{setStudents(p=>{const id=nid(p);return[...p,{...data,id,exams:[],joinDate:new Date().toISOString().split("T")[0]}];});showToast("Student added!","success");}
  },[editing,showToast]);

  const handleDel=useCallback(id=>{if(!confirm("Delete this student?"))return;setStudents(p=>p.filter(s=>s.id!==id));showToast("Student deleted.","error");},[showToast]);

  const handlePaid=useCallback(id=>{
    const s=students.find(x=>x.id===id);
    setStudents(p=>p.map(s=>s.id===id?{...s,feesPaid:s.fees,feesStatus:"Paid"}:s));
    showToast(`${s?.name||"Student"} marked as Paid!`,"success");
  },[students,showToast]);

  const titles={dashboard:"Dashboard",students:"Students",fees:"Fees Management",attendance:"Attendance",exams:"Exams & Results",reports:"Reports",branches:"Branches"};

  if(!loggedIn)return<Login onLogin={()=>setLoggedIn(true)}/>;

  return(
    <div style={{display:"flex",height:"100vh",background:"var(--bg)",overflow:"hidden"}}>
      <Sidebar page={page} setPage={setPage} students={students} onLogout={()=>setLoggedIn(false)}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"0 24px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(12,17,32,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid var(--bdr)",flexShrink:0}}>
          <div style={{fontFamily:"var(--font2)",fontWeight:800,fontSize:18,color:"var(--t1)"}}>{titles[page]}</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:11,color:"var(--t3)"}}>{new Date().toLocaleDateString("en-IN",{weekday:"short",year:"numeric",month:"short",day:"numeric"})}</div>
            <div style={{width:1,height:18,background:"var(--bdr2)"}}/>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff",fontFamily:"var(--font2)"}}>AD</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"22px 24px"}}>
          {page==="dashboard"  &&<DashPage  students={students} onNav={setPage}/>}
          {page==="students"   &&<StudPage  students={students} onAdd={()=>{setEditing(null);setModal(true);}} onEdit={s=>{setEditing(s);setModal(true);}} onDelete={handleDel}/>}
          {page==="fees"       &&<FeesPage  students={students} onMarkPaid={handlePaid}/>}
          {page==="attendance" &&<AttPage   students={students}/>}
          {page==="exams"      &&<ExPage    students={students}/>}
          {page==="reports"    &&<RepPage   students={students}/>}
          {page==="branches"   &&<BrPage    students={students}/>}
        </div>
      </div>
      <StudentForm open={modal} onClose={()=>setModal(false)} onSave={handleSave} editing={editing}/>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
